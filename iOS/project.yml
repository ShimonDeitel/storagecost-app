name: Storagecost
options:
  bundleIdPrefix: com.shimondeitel.storagecost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Storagecost:
    type: application
    platform: iOS
    sources:
      - path: Storagecost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.storagecost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Storagecost/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StoragecostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StoragecostTests
      - path: Storagecost.storekit
    dependencies:
      - target: Storagecost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.storagecost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StoragecostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StoragecostUITests
    dependencies:
      - target: Storagecost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.storagecost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Storagecost:
    build:
      targets:
        Storagecost: all
        StoragecostTests: [test]
        StoragecostUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Storagecost.storekit
    test:
      config: Debug
      storeKitConfiguration: Storagecost.storekit
      targets:
        - StoragecostTests
        - StoragecostUITests
    archive:
      config: Release
